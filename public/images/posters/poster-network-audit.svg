<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Abstract outbound network audit poster">
  <defs>
    <linearGradient id="net-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#050b14"/>
    </linearGradient>
    <radialGradient id="net-origin-glow" cx="20%" cy="50%" r="48%">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.24"/>
      <stop offset="0.45" stop-color="#14b8a6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="net-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#fafbfc" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="net-teal-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="net-amber-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#net-bg)"/>
  <rect width="640" height="400" fill="url(#net-grid)"/>
  <rect width="640" height="400" fill="url(#net-origin-glow)"/>

  <g fill="none" stroke-linecap="round">
    <path d="M152 200C218 120 287 84 362 82" stroke="#5eead4" stroke-opacity="0.54" stroke-width="1.4"/>
    <path d="M152 200C236 162 312 145 430 145" stroke="#5eead4" stroke-opacity="0.48" stroke-width="1.4"/>
    <path d="M152 200C242 218 310 238 388 238" stroke="#f4b860" stroke-opacity="0.64" stroke-width="1.55" stroke-dasharray="7 8"/>
    <path d="M152 200C233 278 319 314 452 310" stroke="#5eead4" stroke-opacity="0.48" stroke-width="1.4"/>
  </g>

  <g transform="translate(118 200)" filter="url(#net-teal-glow)">
    <circle r="42" fill="#14b8a6" fill-opacity="0.08" stroke="#5eead4" stroke-opacity="0.32" stroke-width="1.2"/>
    <circle r="28" fill="#14b8a6" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.72" stroke-width="1.6"/>
    <circle r="9" fill="#5eead4"/>
  </g>

  <g filter="url(#net-teal-glow)">
    <g transform="translate(362 82)">
      <circle r="17" fill="#14b8a6" fill-opacity="0.08" stroke="#5eead4" stroke-opacity="0.58" stroke-width="1.25"/>
      <circle r="5.5" fill="#5eead4"/>
    </g>
    <g transform="translate(430 145)">
      <circle r="17" fill="#14b8a6" fill-opacity="0.08" stroke="#5eead4" stroke-opacity="0.58" stroke-width="1.25"/>
      <circle r="5.5" fill="#5eead4"/>
    </g>
    <g transform="translate(452 310)">
      <circle r="17" fill="#14b8a6" fill-opacity="0.08" stroke="#5eead4" stroke-opacity="0.58" stroke-width="1.25"/>
      <circle r="5.5" fill="#5eead4"/>
    </g>
  </g>

  <g transform="translate(388 238)" filter="url(#net-amber-glow)">
    <circle r="18" fill="#f4b860" fill-opacity="0.09" stroke="#f4b860" stroke-opacity="0.72" stroke-width="1.25"/>
    <circle r="6" fill="#f4b860"/>
  </g>

  <g opacity="0.22" stroke="#5eead4" stroke-width="1" fill="none">
    <circle cx="118" cy="200" r="76"/>
    <circle cx="118" cy="200" r="108"/>
    <path d="M72 88h128M440 64h88M484 332h84M64 320h102"/>
  </g>

  <g fill="#fafbfc" opacity="0.12">
    <circle cx="268" cy="111" r="1.6"/>
    <circle cx="311" cy="151" r="1.6"/>
    <circle cx="278" cy="228" r="1.6"/>
    <circle cx="336" cy="285" r="1.6"/>
  </g>
</svg>
