<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Network outbound audit poster placeholder">
  <defs>
    <linearGradient id="bg-na" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="100%" stop-color="#0e1421" />
    </linearGradient>
    <radialGradient id="glow-na" cx="0.18" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid-na" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="640" height="400" fill="url(#bg-na)"/>
  <rect width="640" height="400" fill="url(#grid-na)"/>
  <rect width="640" height="400" fill="url(#glow-na)"/>

  <!-- Origin (Veil profile) -->
  <g transform="translate(120, 200)">
    <circle r="34" fill="rgba(20,184,166,0.18)" stroke="#5eead4" stroke-width="1.5"/>
    <circle r="14" fill="#14b8a6"/>
    <text y="56" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#5eead4" letter-spacing="1.4">PROFILE</text>
  </g>

  <!-- Outbound nodes -->
  <g font-family="ui-monospace" font-size="9" fill="#97a3b3" letter-spacing="0.8">
    <!-- Node A -->
    <g transform="translate(360, 90)">
      <circle r="7" fill="#5eead4"/>
      <circle r="14" fill="none" stroke="#5eead4" stroke-opacity="0.3"/>
      <text x="22" y="4">api.example.com</text>
      <text x="22" y="18" fill="#168a7e">443 TLS · ✓ trusted</text>
    </g>
    <!-- Node B -->
    <g transform="translate(420, 160)">
      <circle r="7" fill="#5eead4"/>
      <circle r="14" fill="none" stroke="#5eead4" stroke-opacity="0.3"/>
      <text x="22" y="4">cdn.assets.io</text>
      <text x="22" y="18" fill="#168a7e">443 TLS · ✓ trusted</text>
    </g>
    <!-- Node C -->
    <g transform="translate(380, 235)">
      <circle r="7" fill="#f4b860"/>
      <circle r="14" fill="none" stroke="#f4b860" stroke-opacity="0.35"/>
      <text x="22" y="4">tracker.unknown.net</text>
      <text x="22" y="18" fill="#f4b860">flagged · blocked</text>
    </g>
    <!-- Node D -->
    <g transform="translate(430, 310)">
      <circle r="7" fill="#5eead4"/>
      <circle r="14" fill="none" stroke="#5eead4" stroke-opacity="0.3"/>
      <text x="22" y="4">proxy.veil.local</text>
      <text x="22" y="18" fill="#168a7e">tunnel · healthy</text>
    </g>
  </g>

  <!-- Connection lines -->
  <g fill="none" stroke-width="1.2" stroke-linecap="round">
    <path d="M 154 200 L 360 90" stroke="#5eead4" stroke-opacity="0.6"/>
    <path d="M 154 200 L 420 160" stroke="#5eead4" stroke-opacity="0.5"/>
    <path d="M 154 200 L 380 235" stroke="#f4b860" stroke-opacity="0.45" stroke-dasharray="4 4"/>
    <path d="M 154 200 L 430 310" stroke="#5eead4" stroke-opacity="0.5"/>
  </g>

  <!-- Label top-left -->
  <text x="40" y="40" font-family="ui-monospace" font-size="10" fill="#5eead4" letter-spacing="2">// OUTBOUND AUDIT</text>
  <text x="40" y="62" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e6edf5" letter-spacing="-0.5">Every connection</text>
  <text x="40" y="84" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e6edf5" letter-spacing="-0.5">accounted for.</text>

  <text x="40" y="372" font-family="ui-monospace" font-size="9" fill="#6b7787" letter-spacing="1.4">VEIL · NETWORK TRANSPARENCY · DNS + WEBRTC LEAK GUARD</text>
</svg>
