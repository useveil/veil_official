      <rect x="30" y="38" width="294" height="1.2" fill="#5eead4" opacity="0.18"/>
      <rect x="30" y="60" width="210" height="1.2" fill="#fafbfc" opacity="0.08"/>
      <circle cx="330" cy="58" r="4" fill="#5eead4" opacity="0.35"/>
    </g>

    <g transform="translate(150 138)">
      <path d="M0 22 32 0h304l-32 22H0Z" fill="url(#enc-panel-teal)" stroke="#cffff8" stroke-opacity="0.38"/>
      <path d="M0 22h304v62H0Z" fill="#14b8a6" fill-opacity="0.72" stroke="#cffff8" stroke-opacity="0.18"/>
      <path d="M304 22 336 0v62l-32 22V22Z" fill="#0f8f82" fill-opacity="0.8" stroke="#cffff8" stroke-opacity="0.18"/>
      <rect x="26" y="35" width="238" height="1.2" fill="#07111f" opacity="0.24"/>
      <rect x="26" y="56" width="164" height="1.2" fill="#07111f" opacity="0.18"/>
      <circle cx="268" cy="54" r="4" fill="#07111f" opacity="0.35"/>
    </g>
  </g>

  <g stroke="#5eead4" stroke-width="1.25" stroke-linecap="round" opacity="0.42">
    <path d="M300 222V252"/>
    <path d="M300 344V374"/>
    <path d="M300 466V496"/>
    <path d="M292 250l8 8 8-8"/>
    <path d="M292 372l8 8 8-8"/>
    <path d="M292 494l8 8 8-8"/>
