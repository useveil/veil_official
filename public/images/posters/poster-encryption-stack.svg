<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Abstract layered encryption stack poster">
  <defs>
    <linearGradient id="enc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#050b14"/>
    </linearGradient>
    <radialGradient id="enc-glow" cx="50%" cy="20%" r="72%">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.22"/>
      <stop offset="0.42" stop-color="#14b8a6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="enc-panel-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f3845" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#151f2d" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="enc-panel-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263241" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#101927" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="enc-panel-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2533" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#0d1724" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="enc-panel-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.74"/>
    </linearGradient>
    <filter id="enc-shadow" x="-20%" y="-40%" width="140%" height="190%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020713" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#14b8a6" flood-opacity="0.06"/>
    </filter>
    <pattern id="enc-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#fafbfc" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <pattern id="enc-micro-grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0H0V10" fill="none" stroke="#fafbfc" stroke-opacity="0.035" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="600" height="750" fill="url(#enc-bg)"/>
  <rect width="600" height="750" fill="url(#enc-grid)"/>
  <rect width="600" height="750" fill="url(#enc-glow)"/>

  <g opacity="0.26" stroke="#5eead4" stroke-width="1">
