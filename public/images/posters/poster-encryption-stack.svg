  <g opacity="0.18">
    <rect x="240" y="114" width="120" height="522" fill="url(#enc-micro-grid)"/>
    <path d="M240 114h120v522H240Z" fill="none" stroke="#5eead4" stroke-opacity="0.12"/>
  </g>
</svg>
