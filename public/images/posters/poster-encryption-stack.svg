<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Encryption stack poster placeholder">
  <defs>
    <linearGradient id="bg-enc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="100%" stop-color="#07111f" />
    </linearGradient>
    <radialGradient id="glow-enc" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid-enc" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="750" fill="url(#bg-enc)"/>
  <rect width="600" height="750" fill="url(#grid-enc)"/>
  <rect width="600" height="750" fill="url(#glow-enc)"/>

  <g font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#5eead4" letter-spacing="2.4">
    <text x="48" y="56">// ENCRYPTION STACK</text>
  </g>

  <!-- Layer 4: SQLCipher (largest, bottom) -->
  <g transform="translate(60, 540)">
    <rect width="480" height="120" rx="8" fill="rgba(45,55,69,0.6)" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="34" font-family="ui-monospace" font-size="11" fill="#6b7787" letter-spacing="1.6">04</text>
    <text x="24" y="68" font-family="ui-sans-serif, system-ui" font-weight="600" font-size="20" fill="#e6edf5">SQLCipher</text>
    <text x="24" y="92" font-family="ui-sans-serif, system-ui" font-size="13" fill="#97a3b3">Full-database encryption · 元数据 · 索引 · 临时表</text>
  </g>

  <!-- Layer 3: AES-256-GCM -->
  <g transform="translate(90, 400)">
    <rect width="420" height="120" rx="8" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.25)"/>
    <text x="24" y="34" font-family="ui-monospace" font-size="11" fill="#5eead4" letter-spacing="1.6">03</text>
    <text x="24" y="68" font-family="ui-sans-serif, system-ui" font-weight="600" font-size="20" fill="#e6edf5">AES-256-GCM</text>
    <text x="24" y="92" font-family="ui-sans-serif, system-ui" font-size="13" fill="#97a3b3">Per-record IV · authenticated encryption</text>
  </g>

  <!-- Layer 2: Argon2id -->
  <g transform="translate(120, 260)">
    <rect width="360" height="120" rx="8" fill="rgba(20,184,166,0.2)" stroke="rgba(20,184,166,0.45)"/>
    <text x="24" y="34" font-family="ui-monospace" font-size="11" fill="#5eead4" letter-spacing="1.6">02</text>
    <text x="24" y="68" font-family="ui-sans-serif, system-ui" font-weight="600" font-size="20" fill="#e6edf5">Argon2id</text>
    <text x="24" y="92" font-family="ui-sans-serif, system-ui" font-size="13" fill="#97a3b3">memory-hard KDF · GPU/ASIC resistant</text>
  </g>

  <!-- Layer 1: Master Password (top, smallest) -->
  <g transform="translate(150, 120)">
    <rect width="300" height="120" rx="8" fill="#14b8a6" stroke="rgba(255,255,255,0.15)"/>
    <text x="24" y="34" font-family="ui-monospace" font-size="11" fill="#07111f" letter-spacing="1.6">01</text>
    <text x="24" y="68" font-family="ui-sans-serif, system-ui" font-weight="700" font-size="20" fill="#07111f">Master Password</text>
    <text x="24" y="92" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(7,17,31,0.7)">User-held · never uploaded</text>
  </g>

  <!-- connector arrows -->
  <g stroke="#5eead4" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 300 240 L 300 260" />
    <path d="M 295 254 L 300 260 L 305 254" />
    <path d="M 300 380 L 300 400" />
    <path d="M 295 394 L 300 400 L 305 394" />
    <path d="M 300 520 L 300 540" />
    <path d="M 295 534 L 300 540 L 305 534" />
  </g>

  <text x="48" y="710" font-family="ui-monospace" font-size="10" fill="#4a5564" letter-spacing="1.4">VEIL · ZERO-KNOWLEDGE · OPEN SOURCE · AGPL-3.0</text>
</svg>
