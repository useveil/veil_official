      <path d="M440 26 480 0v70l-40 26V26Z" fill="#0f1927" fill-opacity="0.84" stroke="#fafbfc" stroke-opacity="0.08"/>
      <rect x="34" y="41" width="350" height="1.2" fill="#5eead4" opacity="0.18"/>
      <rect x="34" y="64" width="258" height="1.2" fill="#fafbfc" opacity="0.08"/>
      <circle cx="394" cy="62" r="4" fill="#5eead4" opacity="0.38"/>
    </g>

    <g transform="translate(116 260)">
      <path d="M0 24 36 0h372l-36 24H0Z" fill="url(#enc-panel-c)" stroke="#fafbfc" stroke-opacity="0.12"/>
      <path d="M0 24h372v66H0Z" fill="#101b29" fill-opacity="0.74" stroke="#fafbfc" stroke-opacity="0.08"/>
