<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Deterministic fingerprint poster placeholder">
  <defs>
    <linearGradient id="bg-fp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbfc" />
      <stop offset="100%" stop-color="#eef1f5" />
    </linearGradient>
    <pattern id="grid-fp" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(10,14,26,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="640" height="400" fill="url(#bg-fp)"/>
  <rect width="640" height="400" fill="url(#grid-fp)"/>

  <!-- Fingerprint arcs (concentric, asymmetric) -->
  <g transform="translate(160, 200)" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M -120 60 Q -120 -10, -60 -50 Q 0 -90, 80 -70 Q 150 -50, 170 10" opacity="0.95"/>
    <path d="M -105 45 Q -100 -5, -50 -40 Q 5 -75, 75 -60 Q 140 -45, 155 5" opacity="0.85"/>
    <path d="M -90 30 Q -85 0, -40 -28 Q 10 -58, 70 -48 Q 130 -38, 140 -2" opacity="0.75"/>
    <path d="M -75 18 Q -70 -2, -30 -18 Q 15 -42, 65 -36 Q 115 -28, 125 -8" opacity="0.65"/>
    <path d="M -60 8 Q -55 -2, -20 -10 Q 20 -28, 60 -25 Q 95 -22, 110 -12" opacity="0.55"/>
    <path d="M -45 0 Q -42 -2, -10 -4 Q 25 -16, 55 -14 Q 80 -14, 92 -16" opacity="0.45"/>
    <path d="M -28 -2 Q -10 -4, 10 -2 Q 35 0, 50 -4" opacity="0.35"/>
  </g>

  <!-- Loop terminus dots (signature points) -->
  <g fill="#0a0e1a">
    <circle cx="40" cy="260" r="3"/>
    <circle cx="330" cy="190" r="3"/>
    <circle cx="55" cy="140" r="3"/>
  </g>

  <!-- Right side caption / metadata -->
  <g font-family="ui-monospace, SF Mono, Menlo, monospace">
    <text x="400" y="68" font-size="10" fill="#168a7e" letter-spacing="2">// PROFILE 0x2A1F</text>

    <g fill="#0a0e1a" font-family="ui-sans-serif, system-ui">
      <text x="400" y="120" font-size="22" font-weight="700" letter-spacing="-0.5">Deterministic</text>
      <text x="400" y="148" font-size="22" font-weight="700" letter-spacing="-0.5">fingerprint</text>
    </g>

    <g font-size="11" fill="#4a5564" font-family="ui-monospace">
      <text x="400" y="192">canvas    ✓ stable</text>
      <text x="400" y="212">webgl     ✓ stable</text>
      <text x="400" y="232">audio     ✓ stable</text>
      <text x="400" y="252">fonts     ✓ stable</text>
      <text x="400" y="272">platform  ✓ stable</text>
    </g>

    <text x="400" y="316" font-size="10" fill="#6b7787" letter-spacing="1.4">SEED · BIP39 · 24 WORDS</text>
  </g>

  <text x="40" y="372" font-family="ui-monospace" font-size="9" fill="#6b7787" letter-spacing="1.4">VEIL · DETERMINISTIC FINGERPRINT ENGINE</text>
</svg>
