<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Veil register poster</title>
  <desc id="desc">A premium Veil poster for the WorkOS AuthKit register content panel.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1510" y2="1920" gradientUnits="userSpaceOnUse">
