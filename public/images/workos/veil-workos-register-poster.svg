      <path d="M264 64c-37 32-69 76-101 132-30 53-53 104-69 153-16-49-39-100-69-153C-7 140-39 96-76 64c-17-15-43-3-43 20 0 6 2 12 6 18 56 66 102 139 139 218 19 40 34 80 45 120 5 18 20 30 25 30s20-12 25-30c11-40 26-80 45-120 37-79 83-152 139-218 4-6 6-12 6-18 0-23-30-35-47-20Z" transform="translate(272 0) scale(.72)" fill="url(#veilRight)" opacity="0.88"/>
