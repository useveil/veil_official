      <circle cx="64" cy="66" r="29" fill="#60a5fa"/>
      <rect x="112" y="46" width="122" height="17" rx="8" fill="#f8fafc" opacity="0.78"/>
      <rect x="112" y="76" width="92" height="12" rx="6" fill="#94a3b8" opacity="0.48"/>
      <path d="M54 160h176M54 200h176" stroke="#ffffff" stroke-opacity="0.18" stroke-width="14" stroke-linecap="round"/>
